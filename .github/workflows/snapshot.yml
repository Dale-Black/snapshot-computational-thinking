name: Snapshot — build & publish
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force:
        description: "Re-export every notebook (ignore all export caches)"
        type: boolean
        default: false
permissions:
  contents: read
  id-token: write
  attestations: write
concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true
env:
  SNAPSHOT_WT_REF: main
  SNAPSHOT_ENGINE_REF: main
  BINARYEN_VERSION: version_125
  WASMTOOLS_VERSION: 1.244.0
  SNAPSHOT_OPTIMIZE: size
  SNAPSHOT_ORACLE_SAMPLES: "5"
  SNAPSHOT_INGEST_URL: https://snapshot.show

# Build model (general, one-size-fits-most):
#   discover → detect app vs collection + list notebooks, and WARM the Julia depot
#             cache (instantiate + precompile ONCE).
#   export   → a notebook collection fans out: one job per notebook, each RESTORES
#             the warmed depot (no re-precompile) and compiles its notebook in
#             parallel. fail-fast:false so one bad notebook never sinks the rest.
#   publish  → gather the per-notebook outputs into one site, DEDUPLICATE the shared
#             WasmMakie font atlas, then zip → attest → ingest (OIDC). Apps skip the
#             matrix and build/publish in a single job.
# Fine-tuning is via the repo's snapshot.toml (type/app/home/theme/oracle) and a
# blessed build.sh for apps — the defaults Just Work without any of that.

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      kind: ${{ steps.d.outputs.kind }}
      matrix: ${{ steps.d.outputs.matrix }}
      has_notebooks: ${{ steps.d.outputs.has_notebooks }}
    steps:
      - uses: actions/checkout@v4
        with: { path: repo }
      - uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/WasmTarget.jl, ref: "${{ env.SNAPSHOT_WT_REF }}", path: WasmTarget.jl }
      - uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/Snapshot.jl, ref: "${{ env.SNAPSHOT_ENGINE_REF }}", path: Snapshot.jl }
      - uses: julia-actions/setup-julia@v2
        with: { version: "1.12" }
      - uses: julia-actions/cache@v2          # WARMS the shared depot cache
      - name: Instantiate + precompile engine (shared by every matrix job)
        run: julia --project=Snapshot.jl -e 'using Pkg; Pkg.Registry.add("General"); Pkg.instantiate(); using Snapshot'
      - name: Fetch Snapshot driver + collection builder
        run: |
          curl -fsSL "${SNAPSHOT_INGEST_URL%/}/ci/export.jl" -o export.jl
          curl -fsSL "${SNAPSHOT_INGEST_URL%/}/ci/collection.jl" -o collection.jl
      - id: d
        name: Discover (kind + notebook matrix)
        run: |
          julia --project=Snapshot.jl export.jl discover repo discover.json
          kind=$(jq -r '.kind' discover.json)
          matrix=$(jq -c '{nb: .notebooks}' discover.json)
          n=$(jq '.notebooks | length' discover.json)
          { echo "kind=$kind"; echo "matrix=$matrix"; echo "has_notebooks=$([ "${n:-0}" -gt 0 ] && echo true || echo false)"; } >> "$GITHUB_OUTPUT"
          echo "→ kind=$kind, $n notebook(s)"

  # ── a notebook collection: one parallel job per notebook ──────────────────
  export:
    needs: discover
    if: needs.discover.outputs.kind == 'collection' && needs.discover.outputs.has_notebooks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with: { path: repo }
      - uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/WasmTarget.jl, ref: "${{ env.SNAPSHOT_WT_REF }}", path: WasmTarget.jl }
      - uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/Snapshot.jl, ref: "${{ env.SNAPSHOT_ENGINE_REF }}", path: Snapshot.jl }
      # ── per-notebook export cache: key = notebook source hash + engine content +
      # WasmTarget SHA + every knob that changes the compiled output (optimize level,
      # oracle depth, Binaryen/wasm-tools versions). A cache HIT means NOTHING that
      # affects this notebook's export changed since it was last built → restore its
      # <slug>/ and skip Julia entirely. Only CHANGED notebooks pay the compile cost.
      # OVERRIDES (skip the cache → always re-export):
      #   • snapshot.toml `cache = false` (top-level: all notebooks; or per-[[notebooks]])
      #   • manual run with the "force" checkbox (Actions → Run workflow)
      # (Custom build.sh / app builds never use this cache — they always run in full.)
      - id: keys
        name: Compute cache key parts (WasmTarget SHA)
        run: |
          echo "wt=$(git -C WasmTarget.jl rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - id: cache
        if: matrix.nb.cache != false && inputs.force != true
        uses: actions/cache@v4
        with:
          path: _stage/${{ matrix.nb.slug }}
          # v4: + oracle depth + Binaryen/wasm-tools versions (all affect the emitted
          # wasm/verification). Engine-CONTENT hash (not commit SHA) so an engine
          # docs-only push doesn't bust every tenant's notebook cache.
          key: snap-nb-v4-${{ matrix.nb.slug }}-${{ hashFiles(format('repo/{0}', matrix.nb.notebook)) }}-wt${{ steps.keys.outputs.wt }}-eng${{ hashFiles('Snapshot.jl/src/**', 'Snapshot.jl/assets/**', 'Snapshot.jl/Project.toml') }}-${{ env.SNAPSHOT_OPTIMIZE }}-o${{ env.SNAPSHOT_ORACLE_SAMPLES }}-b${{ env.BINARYEN_VERSION }}-t${{ env.WASMTOOLS_VERSION }}
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: julia-actions/setup-julia@v2
        with: { version: "1.12" }
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: julia-actions/cache@v2          # RESTORES the warmed depot — no re-precompile
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with: { node-version: "22" }
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Install Binaryen (wasm-opt, wasm-merge)
        run: |
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar -xz
          echo "$PWD/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Install wasm-tools
        run: |
          curl -fsSL "https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASMTOOLS_VERSION}/wasm-tools-${WASMTOOLS_VERSION}-x86_64-linux.tar.gz" | tar -xz
          echo "$PWD/wasm-tools-${WASMTOOLS_VERSION}-x86_64-linux" >> "$GITHUB_PATH"
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Instantiate (restored cache → fast)
        run: julia --project=Snapshot.jl -e 'using Pkg; Pkg.instantiate()'
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Fetch Snapshot driver + collection builder
        run: |
          curl -fsSL "${SNAPSHOT_INGEST_URL%/}/ci/export.jl" -o export.jl
          curl -fsSL "${SNAPSHOT_INGEST_URL%/}/ci/collection.jl" -o collection.jl
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Export ${{ matrix.nb.slug }}
        run: julia --project=Snapshot.jl export.jl one repo _stage "${{ matrix.nb.slug }}" "${{ matrix.nb.notebook }}"
      - name: Cache status
        run: |
          hit="${{ steps.cache.outputs.cache-hit || 'false' }}"
          why=""
          [ "${{ matrix.nb.cache }}" = "false" ] && why=" (snapshot.toml cache=false)"
          [ "${{ inputs.force }}" = "true" ] && why=" (forced re-export)"
          if [ "$hit" = "true" ]; then
            echo "♻️  \`${{ matrix.nb.slug }}\` — unchanged, reused cached export" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "🔨 \`${{ matrix.nb.slug }}\` — exported$why" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "${{ matrix.nb.slug }} cache-hit=$hit$why"
      - uses: actions/upload-artifact@v4
        with:
          name: nb-${{ matrix.nb.slug }}
          path: _stage
          retention-days: 1
          if-no-files-found: error

  collection-publish:
    needs: [discover, export]
    if: needs.discover.outputs.kind == 'collection' && needs.discover.outputs.has_notebooks == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: repo }
      - uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/WasmTarget.jl, ref: "${{ env.SNAPSHOT_WT_REF }}", path: WasmTarget.jl }
      - uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/Snapshot.jl, ref: "${{ env.SNAPSHOT_ENGINE_REF }}", path: Snapshot.jl }
      - uses: julia-actions/setup-julia@v2
        with: { version: "1.12" }
      - uses: julia-actions/cache@v2
      - name: Instantiate (restored cache → fast)
        run: julia --project=Snapshot.jl -e 'using Pkg; Pkg.instantiate()'
      - name: Fetch Snapshot driver + collection builder
        run: |
          curl -fsSL "${SNAPSHOT_INGEST_URL%/}/ci/export.jl" -o export.jl
          curl -fsSL "${SNAPSHOT_INGEST_URL%/}/ci/collection.jl" -o collection.jl
      - name: Gather per-notebook exports
        uses: actions/download-artifact@v4
        with:
          pattern: nb-*
          merge-multiple: true
          path: _stage
      - name: Assemble site (+ dedup shared font atlas) → manifest
        run: julia --project=Snapshot.jl export.jl gather repo _stage
      - name: Package the site as one zip
        run: |
          ok=$(jq -r '.ok' _stage/manifest.json)
          [ "${ok:-0}" -gt 0 ] || { echo "no notebooks published"; exit 1; }
          ( cd _stage && zip -qr "$GITHUB_WORKSPACE/site.zip" . )
          ls -la site.zip
          # Pre-flight size gate: uploads over ~100 MB die at Cloudflare's edge with an
          # opaque 413 before Snapshot can even reply — fail HERE with a useful breakdown.
          zipmb=$(( $(wc -c < site.zip) / 1048576 ))
          if [ "$zipmb" -ge 95 ]; then
            echo "::error title=Bundle too large to upload::site.zip is ${zipmb} MB — the platform's hard upload ceiling is ~95 MB (compressed). Largest files in your site:"
            ( cd _stage && find . -type f -size +1M -exec du -m {} + | sort -rn | head -12 )
            echo "Trim the biggest files (pre-rendered notebook HTML with embedded state is the usual culprit), lower figure resolution, or exclude heavy pages from this build."
            exit 1
          elif [ "$zipmb" -ge 20 ]; then
            echo "::warning title=Large bundle::site.zip is ${zipmb} MB compressed — this may exceed your plan's publish limit (the publish step will say so if it does)."
          fi
      - name: Attest build provenance
        # GitHub's provenance attestation isn't available for user-owned PRIVATE
        # repos, so it errors there and would sink the publish. Skip it for private
        # repos (Snapshot sends its own sha256(site.zip) digest at publish anyway);
        # continue-on-error keeps a transient public-repo hiccup non-fatal too.
        if: ${{ github.event.repository.private != true }}
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with: { subject-path: "site.zip" }
      - name: Publish site to Snapshot (OIDC)
        run: |
          OIDC=$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=snapshot" | jq -r '.value')
          owner="${GITHUB_REPOSITORY%%/*}"; reponame="${GITHUB_REPOSITORY##*/}"
          slug=$(jq -r '.slug' _stage/manifest.json); index=$(jq -r '.index' _stage/manifest.json); kind=$(jq -r '.kind' _stage/manifest.json)
          digest=$(sha256sum site.zip | awk '{print $1}')
          zipkb=$(( $(wc -c < site.zip) / 1024 ))
          echo "Publishing '${slug}' (${kind}) — bundle ${zipkb} KB (sha256:${digest})"
          code=$(curl -sS -o /tmp/sn_resp.txt -w "%{http_code}" -X POST "${SNAPSHOT_INGEST_URL%/}/ingest" \
            -H "authorization: Bearer ${OIDC}" -H "x-snapshot-auth: oidc" \
            -H "x-snapshot-owner: ${owner}" -H "x-snapshot-repo: ${reponame}" \
            -H "x-snapshot-notebook: ${slug}" -H "x-snapshot-kind: ${kind}" \
            -H "x-snapshot-commit: ${GITHUB_SHA}" -H "x-snapshot-index: ${index}" \
            -H "x-snapshot-attestation: sha256:${digest}" \
            -H "content-type: application/zip" --data-binary "@site.zip" || echo "000")
          reason="$(cat /tmp/sn_resp.txt 2>/dev/null)"
          if [ "${code:-000}" -ge 200 ] && [ "${code:-000}" -lt 300 ]; then echo "✓ Published. ${reason}"; exit 0; fi
          echo "::error title=Snapshot couldn't publish your site::HTTP ${code} — ${reason}"
          case "${code}" in
            413) echo "  Over the size limit — trim large notebooks/images (heavy WASM islands are the usual culprit)." ;;
            403) echo "  Repo not enabled for publishing, or it's private (only public repos for now)." ;;
            429) echo "  Too many publishes in a short window — wait, then retry." ;;
            503) echo "  Snapshot is temporarily at capacity / paused — hosted sites are unaffected; retry later." ;;
            000) echo "  Couldn't reach Snapshot at all (network/URL)." ;;
          esac
          exit 1

  # ── a Therapy app: single-job build + publish (snapshot.toml/build.sh drive it) ──
  app-publish:
    needs: discover
    if: needs.discover.outputs.kind == 'app'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with: { path: repo }
      - uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/WasmTarget.jl, ref: "${{ env.SNAPSHOT_WT_REF }}", path: WasmTarget.jl }
      - uses: actions/checkout@v4
        with: { repository: GroupTherapyOrg/Snapshot.jl, ref: "${{ env.SNAPSHOT_ENGINE_REF }}", path: Snapshot.jl }
      - uses: julia-actions/setup-julia@v2
        with: { version: "1.12" }
      - uses: julia-actions/cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install Binaryen (wasm-opt, wasm-merge)
        run: |
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar -xz
          echo "$PWD/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"
      - name: Install wasm-tools
        run: |
          curl -fsSL "https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASMTOOLS_VERSION}/wasm-tools-${WASMTOOLS_VERSION}-x86_64-linux.tar.gz" | tar -xz
          echo "$PWD/wasm-tools-${WASMTOOLS_VERSION}-x86_64-linux" >> "$GITHUB_PATH"
      - name: Instantiate engine
        run: julia --project=Snapshot.jl -e 'using Pkg; Pkg.instantiate()'
      - name: Fetch Snapshot driver + collection builder
        run: |
          curl -fsSL "${SNAPSHOT_INGEST_URL%/}/ci/export.jl" -o export.jl
          curl -fsSL "${SNAPSHOT_INGEST_URL%/}/ci/collection.jl" -o collection.jl
      - name: Build app (snapshot.toml [app] / build.sh / app.jl build)
        run: julia --project=Snapshot.jl export.jl repo _stage
      - name: Package the site as one zip
        run: |
          ok=$(jq -r '.ok' _stage/manifest.json)
          [ "${ok:-0}" -gt 0 ] || { echo "app produced nothing to publish"; exit 1; }
          ( cd _stage && zip -qr "$GITHUB_WORKSPACE/site.zip" . )
          ls -la site.zip
          # Pre-flight size gate: uploads over ~100 MB die at Cloudflare's edge with an
          # opaque 413 before Snapshot can even reply — fail HERE with a useful breakdown.
          zipmb=$(( $(wc -c < site.zip) / 1048576 ))
          if [ "$zipmb" -ge 95 ]; then
            echo "::error title=Bundle too large to upload::site.zip is ${zipmb} MB — the platform's hard upload ceiling is ~95 MB (compressed). Largest files in your site:"
            ( cd _stage && find . -type f -size +1M -exec du -m {} + | sort -rn | head -12 )
            echo "Trim the biggest files (pre-rendered notebook HTML with embedded state is the usual culprit), lower figure resolution, or exclude heavy pages from this build."
            exit 1
          elif [ "$zipmb" -ge 20 ]; then
            echo "::warning title=Large bundle::site.zip is ${zipmb} MB compressed — this may exceed your plan's publish limit (the publish step will say so if it does)."
          fi
      - name: Attest build provenance
        # GitHub's provenance attestation isn't available for user-owned PRIVATE
        # repos, so it errors there and would sink the publish. Skip it for private
        # repos (Snapshot sends its own sha256(site.zip) digest at publish anyway);
        # continue-on-error keeps a transient public-repo hiccup non-fatal too.
        if: ${{ github.event.repository.private != true }}
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with: { subject-path: "site.zip" }
      - name: Publish site to Snapshot (OIDC)
        run: |
          OIDC=$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=snapshot" | jq -r '.value')
          owner="${GITHUB_REPOSITORY%%/*}"; reponame="${GITHUB_REPOSITORY##*/}"
          slug=$(jq -r '.slug' _stage/manifest.json); index=$(jq -r '.index' _stage/manifest.json); kind=$(jq -r '.kind' _stage/manifest.json)
          digest=$(sha256sum site.zip | awk '{print $1}')
          zipkb=$(( $(wc -c < site.zip) / 1024 ))
          echo "Publishing '${slug}' (${kind}) — bundle ${zipkb} KB (sha256:${digest})"
          code=$(curl -sS -o /tmp/sn_resp.txt -w "%{http_code}" -X POST "${SNAPSHOT_INGEST_URL%/}/ingest" \
            -H "authorization: Bearer ${OIDC}" -H "x-snapshot-auth: oidc" \
            -H "x-snapshot-owner: ${owner}" -H "x-snapshot-repo: ${reponame}" \
            -H "x-snapshot-notebook: ${slug}" -H "x-snapshot-kind: ${kind}" \
            -H "x-snapshot-commit: ${GITHUB_SHA}" -H "x-snapshot-index: ${index}" \
            -H "x-snapshot-attestation: sha256:${digest}" \
            -H "content-type: application/zip" --data-binary "@site.zip" || echo "000")
          reason="$(cat /tmp/sn_resp.txt 2>/dev/null)"
          if [ "${code:-000}" -ge 200 ] && [ "${code:-000}" -lt 300 ]; then echo "✓ Published. ${reason}"; exit 0; fi
          echo "::error title=Snapshot couldn't publish your site::HTTP ${code} — ${reason}"
          case "${code}" in
            413) echo "  Over the size limit — trim large notebooks/images (heavy WASM islands are the usual culprit)." ;;
            403) echo "  Repo not enabled for publishing, or it's private (only public repos for now)." ;;
            429) echo "  Too many publishes in a short window — wait, then retry." ;;
            503) echo "  Snapshot is temporarily at capacity / paused — hosted sites are unaffected; retry later." ;;
            000) echo "  Couldn't reach Snapshot at all (network/URL)." ;;
          esac
          exit 1
